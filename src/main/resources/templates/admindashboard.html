<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<h1>Admin Dashboard</h1>

<div class="logout">
    <span></span>
    <a th:href="@{/logout}" class="btn">Logout</a>
</div>

<div class="accountinfo">
    <h2 >Your Information</h2>
    <table>
        <tr><th>ID</th><td th:text="${currentAccount.id}"></td></tr>
        <tr><th>Name</th><td th:text="${currentAccount.name}"></td></tr>
        <tr><th>Email</th><td th:text="${currentAccount.email}"></td></tr>
        <tr><th>Address</th><td th:text="${currentAccount.address}"></td></tr>
        <tr><th>Phone</th><td th:text="${currentAccount.phoneNumber}"></td></tr>
        <tr><th>Balance</th><td th:text="${#numbers.formatDecimal(currentAccount.balance, 1, 2)}"></td></tr>
    </table>
</div>

<h2 >All Accounts</h2>
<table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Phone Number</th>
        <th>Balance</th>
    </tr>
    <tbody>
    <tr th:each="account : ${allaccount}">
        <td th:text="${account.id}"></td>
        <td th:text="${account.name}"></td>
        <td th:text="${account.email}"></td>
        <td th:text="${account.phoneNumber}"></td>
        <td th:text="${#numbers.formatDecimal(account.balance, 1, 2)}"></td>
    </tr>
    </tbody>
</table>

<h2 >Transactions</h2>
<table>
    <tr>
        <th>ID</th>
        <th>Account Name</th>
        <th>Created At</th>
        <th>Type</th>
        <th>Amount</th>
        <th>Previous Balance</th>
    </tr>
    <tbody>
    <tr th:if="${#lists.isEmpty(transactions)}">
        <td colspan="5" class="text-center">No transaction history.</td>
    </tr>
    <tr th:each="tx : ${transactions}">
        <td th:text="${tx.id}"></td>
        <td th:text="${tx.account.getName()}"></td>
        <td th:text="${#temporals.format(tx.createdAt, 'dd MMM yyyy, hh:mm:ss a')}"></td>
        <td th:text="${tx.transactionType}"></td>
        <td th:text="${#numbers.formatDecimal(tx.amount, 1, 2)}"></td>
        <td th:text="${#numbers.formatDecimal(tx.previous_amount, 1, 2)}"></td>
    </tr>
    </tbody>
</table>

</body>
</html>
